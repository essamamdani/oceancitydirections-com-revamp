<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps API Key Tester</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; }
        input[type="text"] { width: 300px; padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; background-color: #0070f3; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0051a2; }
        #status { margin-bottom: 20px; padding: 10px; border-radius: 4px; }
        .status-waiting { background-color: #f0f0f0; border: 1px solid #ccc; }
        .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #map { width: 100%; height: 400px; background-color: #eee; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Google Maps API Key Tester</h1>
    <p>Enter your Google Maps API Key below to verify if it works for the <strong>Maps JavaScript API</strong>.</p>
    
    <div class="input-group">
        <input type="text" id="apiKeyInput" placeholder="Enter API Key here" />
        <button onclick="testKey()">Test API Key</button>
    </div>

    <div id="status" class="status-waiting">Status: Waiting for input...</div>
    <div id="map"></div>

    <script>
        // Global function to handle Google Maps authentication failures
        window.gm_authFailure = function() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = "Status: Authentication Failed! Invalid API Key or authorized domain restrictions prevent usage here.";
            statusEl.className = 'status-error';
            console.error("Google Maps Auth Failure");
        };

        function testKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const statusEl = document.getElementById('status');
            const mapEl = document.getElementById('map');

            if (!apiKey) {
                alert("Please enter an API key");
                return;
            }

            statusEl.textContent = "Status: Testing...";
            statusEl.className = 'status-waiting';
            mapEl.innerHTML = ''; // Clear previous map

            // Remove existing script if any
            const existingScript = document.getElementById('google-maps-script');
            if (existingScript) {
                existingScript.remove();
                // Clean up global objects
                window.google = undefined;
            }

            // Create new script tag
            const script = document.createElement('script');
            script.id = 'google-maps-script';
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap`;
            script.async = true;
            script.defer = true;
            
            script.onerror = function() {
                statusEl.textContent = "Status: Network Error - Failed to load Google Maps script.";
                statusEl.className = 'status-error';
            };

            document.head.appendChild(script);
        }

        // Callback function when Google Maps script loads successfully
        window.initMap = function() {
            const statusEl = document.getElementById('status');
            const mapEl = document.getElementById('map');
            
            try {
                const map = new google.maps.Map(mapEl, {
                    center: { lat: 38.9784, lng: -76.4922 }, // Annapolis coordinates
                    zoom: 12,
                });

                // If we get here without auth failure (which is async), it looks good initially
                // We'll set a timeout to check if the map tiles actually load or if auth failure triggers
                statusEl.textContent = "Status: Script loaded successfully. Verifying map tiles...";
                statusEl.className = 'status-waiting';

                // Listen for tilesloaded event as a sign of success
                google.maps.event.addListenerOnce(map, 'tilesloaded', function() {
                    statusEl.textContent = "Status: Success! Map loaded and tiles rendered. Key is valid.";
                    statusEl.className = 'status-success';
                });

            } catch (error) {
                statusEl.textContent = "Status: Error initializing map: " + error.message;
                statusEl.className = 'status-error';
                console.error(error);
            }
        };
    </script>
</body>
</html>
